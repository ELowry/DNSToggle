name: F-Droid Metadata Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install fdroidserver
        run: |
          python3 -m pip install fdroidserver

      - name: Verify Fastlane Structure
        run: |
          # Basic check to ensure required files exist in the Fastlane structure
          # F-Droid requires at least en-US title, short_description, and full_description
          MISSING=0
          FILES=(
            "app/src/main/fastlane/metadata/android/en-US/title.txt"
            "app/src/main/fastlane/metadata/android/en-US/short_description.txt"
            "app/src/main/fastlane/metadata/android/en-US/full_description.txt"
          )
          
          for file in "${FILES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Error: Missing mandatory F-Droid metadata file: $file"
              MISSING=1
            fi
          done
          
          if [ $MISSING -eq 1 ]; then
            exit 1
          fi
          echo "Fastlane structure verified successfully."

      - name: Run fdroid lint (Dry Run)
        run: |
          # Note: 'fdroid lint' typically expects a full metadata/ repo setup, instead we check fastlane data only.
          fdroid rewritemeta --check com.ericlowry.dnstoggle || echo "Initial check done"
