name: F-Droid Metadata Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Verify Fastlane Structure and Content
        run: |
          METADATA_DIR="app/fastlane/metadata/android"
          FAILED=0
          
          # Check for en-US at minimum
          if [ ! -d "$METADATA_DIR/en-US" ]; then
            echo "Error: Mandatory en-US metadata directory is missing."
            FAILED=1
          fi

          # Iterate through all locale directories
          for locale_dir in "$METADATA_DIR"/*/; do
            if [ -d "$locale_dir" ]; then
              locale_name=$(basename "$locale_dir")
              echo "Verifying locale: $locale_name"
              
              # Check for mandatory files
              for file_name in "title.txt" "short_description.txt" "full_description.txt"; do
                if [ ! -f "$locale_dir$file_name" ]; then
                  echo "  Error: Missing mandatory file: $file_name"
                  FAILED=1
                fi
              done
              
              # Check character limits
              # summary (short_description.txt) must be <= 80 characters
              if [ -f "$locale_dir/short_description.txt" ]; then
                CHAR_COUNT=$(wc -m < "$locale_dir/short_description.txt")
                echo "  Short description: $CHAR_COUNT / 80"
                if [ $CHAR_COUNT -gt 80 ]; then
                  echo "  Error: Character limit exceeded (80)"
                  FAILED=1
                fi
              fi
              
              # description (full_description.txt) must be <= 4000 characters
              if [ -f "$locale_dir/full_description.txt" ]; then
                CHAR_COUNT=$(wc -m < "$locale_dir/full_description.txt")
                echo "  Full description: $CHAR_COUNT / 4000"
                if [ $CHAR_COUNT -gt 4000 ]; then
                  echo "  Error: Character limit exceeded (4000)"
                  FAILED=1
                fi
              fi
            fi
          done
          
          if [ $FAILED -eq 1 ]; then
            exit 1
          fi
          echo "Fastlane metadata verified successfully."

      - name: Scan for proprietary dependencies (F-Droid compliance)
        run: |
          # Basic scan for things F-Droid might flag as "Anti-Features"
          # This provides warnings but doesn't fail the build.
          grep -rn "com.google.android.gms" . && echo "Warning: Potential non-free GMS dependency found." || true
          grep -rn "firebase" . && echo "Warning: Potential non-free Firebase dependency found." || true
          grep -rn "admob" . && echo "Warning: Potential advertising dependency found." || true
