name: Release Signed APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Prepare Release Info
        id: release_info
        run: |
          # Extract versionCode and versionName from build.gradle.kts
          VERSION_CODE=$(grep -E 'versionCode\s*=\s*[0-9]+' app/build.gradle.kts | tr -dc '0-9')
          VERSION_NAME=$(grep -E 'versionName\s*=\s*".+"' app/build.gradle.kts | cut -d'"' -f2)
          
          # Determine final version (prioritize git tag, fallback to versionName)
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="v${VERSION_NAME}"
          fi
          # Ensure 'v' prefix for filename consistency
          [[ $VERSION == v* ]] || VERSION="v$VERSION"

          CHANGELOG_PATH="app/fastlane/metadata/android/en-US/changelogs/${VERSION_CODE}.txt"
          if [ ! -f "$CHANGELOG_PATH" ]; then
            echo "No specific changelog found for this release." > "$CHANGELOG_PATH"
          fi
          
          echo "path=$CHANGELOG_PATH" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and Sign Release APK
        id: sign_app
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # Decode keystore
          echo "$SIGNING_KEY" | base64 --decode > release.keystore
          
          # Build and sign natively with Gradle
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/release.keystore \
            -Pandroid.injected.signing.store.password=$KEY_STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            -Pandroid.dependenciesInfo.includeInApk=false
            
          # Prepare the output filename
          VERSION="${{ steps.release_info.outputs.version }}"
          SIGNED_APK_PATH="dns_toggle_${VERSION}.apk"
          
          # Find the signed APK generated by Gradle
          APK_PATH=$(find app/build/outputs/apk/release -name '*.apk' | head -n 1)
          mv "$APK_PATH" "$SIGNED_APK_PATH"
            
          # Clean up the keystore for safety
          rm release.keystore
          
          echo "signedReleaseFile=$SIGNED_APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_info.outputs.version }}
          files: ${{ steps.sign_app.outputs.signedReleaseFile }}
          generate_release_notes: true
          draft: true
          body_path: ${{ steps.release_info.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
